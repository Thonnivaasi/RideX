workflows:
  android-debug:
    name: ridex Debug
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
